<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkei Mart | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container { text-align: center; padding: 20px; }
        .logo {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; opacity: 0.8; }
        .divider {
            height: 1px;
            width: 50px;
            background: #38bdf8;
            margin: 20px auto;
        }
        p { font-size: 0.9rem; opacity: 0.6; line-height: 1.6; max-width: 400px; margin: 0 auto; }
        .status-badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 30px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Merkei Mart</div>
        <h1>Coming Soon</h1>
        <div class="divider"></div>
        <p>We're currently upgrading our platform to provide a better experience for global connectivity. Stay tuned!</p>
        <div class="status-badge">SYSTEM UNDER MAINTENANCE</div>
    </div>
</body>
</html>
