    <style>
        :root {
            --primary: #0062ff;
            --secondary: #00c2ff;
            --bg: #020617;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0a192f, #020617);
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            position: sticky;
            top: 0;
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* HERO SECTION */
        header {
            text-align: center;
            padding: 120px 10% 80px;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        header p {
            color: #aaa;
            max-width: 750px;
            margin: auto;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        .btn-group { margin-top: 40px; }

        .btn {
            padding: 14px 35px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 98, 255, 0.4);
        }

        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 98, 255, 0.6); }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            margin-left: 15px;
        }

        .btn-outline:hover { background: rgba(255, 255, 255, 0.1); }

        /* GLASS CARD EFFECT */
        .glass {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            border-radius: 15px;
        }

        /* SERVICES GRID */
        .services { padding: 100px 10%; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .card { padding: 35px; transition: 0.4s ease; text-align: left; }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--secondary);
        }
        .card i { color: var(--secondary); margin-bottom: 20px; }
        .card h3 { margin-bottom: 10px; font-size: 1.4rem; }
        .card p { color: #888; font-size: 0.95rem; line-height: 1.5; }

        /* CASE STUDIES SECTION */
        .projects { padding: 80px 10%; text-align: center; background: rgba(0, 0, 0, 0.2); }
        .project-list { max-width: 900px; margin: 40px auto; }
        .project {
            margin-bottom: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .project-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .project-title i { color: #2ecc71; }
        .project p { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-left: 35px; }
        .tech-tags { margin-left: 35px; margin-top: 15px; }
        .tag {
            font-size: 0.75rem;
            background: rgba(0, 98, 255, 0.15);
            color: var(--secondary);
            padding: 4px 10px;
            border-radius: 4px;
            margin-right: 8px;
            border: 1px solid rgba(0, 194, 255, 0.2);
        }

        /* CONTACT FORM */
        .contact { padding: 100px 10%; }
        .form-box { max-width: 600px; margin: auto; padding: 45px; }
        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3); color: white; box-sizing: border-box; font-family: inherit;
        }
        input:focus, textarea:focus { outline: 2px solid var(--primary); background: rgba(0, 0, 0, 0.5); }
        button {
            width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 50px;
            color: #555;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        /* WHATSAPP */
        .whatsapp {
            position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000; transition: 0.3s; text-decoration: none;
        }
